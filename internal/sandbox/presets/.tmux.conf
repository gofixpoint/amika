# Use tmux-256color for proper capability detection (256 color, italics, etc.)
set -g default-terminal "tmux-256color"

# Pass through true color (24-bit) for terminals that support it.
set -ga terminal-overrides ",xterm-ghostty:Tc,xterm-256color:Tc,alacritty:Tc"

# Lower escape delay so Esc registers instantly in vim/neovim.
set -sg escape-time 10

# Enable focus events so editors can detect window focus.
set -g focus-events on

# Enable mouse support for scrolling and pane selection.
set -g mouse on

# Increase scrollback buffer.
set -g history-limit 10000
