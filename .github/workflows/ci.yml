name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: go/go.sum

      - name: Check formatting
        run: make fmtcheck

      - name: Vet
        run: make vet

      - name: Lint
        run: make lint

      - name: Build
        run: make build

      - name: Test
        run: make test
