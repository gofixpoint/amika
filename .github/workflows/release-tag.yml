name: Create Release Tag

# Manually cuts a component-scoped annotated release tag from the current main
# branch tip. This is the entry point for stable and prerelease publishing:
# the created tag triggers release.yml, which performs the cross-platform build
# and GitHub Release publication.
#
# Supported tag shapes:
#   amika/v1.2.3
#   amika/v1.2.3-rc.1
#   amika-server/v1.2.3
#   amika-server/v1.2.3-beta.1

on:
  workflow_dispatch:
    inputs:
      component:
        description: Component to release
        required: true
        type: choice
        options:
          - amika
          - amika-server
      major:
        description: Major version number
        required: true
        type: string
      minor:
        description: Minor version number
        required: true
        type: string
      patch:
        description: Patch version number
        required: true
        type: string
      prerelease:
        description: "Pre-release suffix (e.g. rc.1, beta.1) — leave empty for stable releases"
        required: false
        type: string

permissions:
  contents: write

jobs:
  create-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "This workflow can only be run from the main branch." >&2
            exit 1
          fi

      - name: Validate version inputs
        env:
          MAJOR: ${{ inputs.major }}
          MINOR: ${{ inputs.minor }}
          PATCH: ${{ inputs.patch }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          for part in MAJOR MINOR PATCH; do
            val=$(eval echo "\$$part")
            if ! printf '%s' "$val" | grep -Eq '^[0-9]+$'; then
              echo "$part must be a non-negative integer, got: $val" >&2
              exit 1
            fi
          done
          if [ -n "$PRERELEASE" ]; then
            if ! printf '%s' "$PRERELEASE" | grep -Eq '^[0-9A-Za-z]+(\.[0-9A-Za-z]+)*$'; then
              echo "Pre-release must follow semver pre-release syntax (e.g. rc.1), got: $PRERELEASE" >&2
              exit 1
            fi
          fi

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Assemble version string
        id: version
        env:
          MAJOR: ${{ inputs.major }}
          MINOR: ${{ inputs.minor }}
          PATCH: ${{ inputs.patch }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          version="v${MAJOR}.${MINOR}.${PATCH}"
          if [ -n "$PRERELEASE" ]; then
            version="${version}-${PRERELEASE}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Verify tag does not already exist
        env:
          COMPONENT: ${{ inputs.component }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          tag="${COMPONENT}/${VERSION}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists." >&2
            exit 1
          fi

      - name: Verify repository is healthy enough to tag
        run: |
          make fmtcheck
          make vet
          make test-unit

      - name: Create and push annotated tag
        env:
          COMPONENT: ${{ inputs.component }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          tag="${COMPONENT}/${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"
