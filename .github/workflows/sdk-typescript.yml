name: SDK TypeScript

on:
  push:
    branches: [main]
    paths:
      - "sdk/typescript/**"
      - ".github/workflows/sdk-typescript.yml"
  pull_request:
    branches: [main]
    paths:
      - "sdk/typescript/**"
      - ".github/workflows/sdk-typescript.yml"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: sdk/typescript/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm formatcheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
